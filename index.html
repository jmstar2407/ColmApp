<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS Colmado - Iniciar Sesión</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <span class="material-icons store-icon">store</span>
                <h1>Sistema POS Colmado</h1>
                <p>República Dominicana</p>
            </div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" required placeholder="admin@colmado.com">
                </div>
                
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                
                <button type="submit" class="btn-primary">Iniciar Sesión</button>
            </form>
            
            <div id="errorMessage" class="error-message"></div>
            
            <div class="register-link">
                <p>¿No tienes cuenta? <a href="#" onclick="showRegister()">Registrar negocio</a></p>
            </div>
        </div>
        
        <div id="registerModal" class="modal" style="display: none;">
            <div class="modal-content">
                <span class="close" onclick="hideRegister()">&times;</span>
                <h2>Registrar Nuevo Negocio</h2>
                <form id="registerForm">
                    <h3>Datos del Negocio</h3>
                    <div class="form-group">
                        <label>Nombre del Colmado *</label>
                        <input type="text" id="negocioNombre" required>
                    </div>
                    <div class="form-group">
                        <label>RNC</label>
                        <input type="text" id="negocioRNC">
                    </div>
                    <div class="form-group">
                        <label>Dirección *</label>
                        <input type="text" id="negocioDireccion" required>
                    </div>
                    <div class="form-group">
                        <label>Teléfono</label>
                        <input type="tel" id="negocioTelefono">
                    </div>
                    
                    <h3>Cuenta de Administrador</h3>
                    <div class="form-group">
                        <label>Correo *</label>
                        <input type="email" id="registerEmail" required>
                    </div>
                    <div class="form-group">
                        <label>Contraseña *</label>
                        <input type="password" id="registerPassword" required>
                    </div>
                    
                    <button type="submit" class="btn-primary">Registrar Negocio</button>
                </form>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>

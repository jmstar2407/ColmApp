<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productos - POS Colmado</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <span class="material-icons">store</span>
                <h3 id="negocioNombre">Cargando...</h3>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html">Dashboard</a>
                <a href="pos.html">POS</a>
                <a href="productos.html" class="active">Productos</a>
                <a href="clientes.html">Clientes</a>
                <a href="caja.html">Caja</a>
                <a href="reportes.html">Reportes</a>
                <a href="contabilidad.html">Contabilidad</a>
                <a href="#" onclick="logout()">Cerrar Sesión</a>
            </nav>
        </aside>
        
        <main class="main-content">
            <div class="top-bar">
                <h1>Productos</h1>
                <button onclick="mostrarModalProducto()" class="btn-primary">+ Nuevo Producto</button>
            </div>
            
            <div class="search-bar">
                <input type="text" id="searchProduct" placeholder="Buscar producto...">
                <select id="filterCategoria">
                    <option value="">Todas las categorías</option>
                </select>
            </div>
            
            <div class="table-container">
                <table id="productosTable">
                    <thead>
                        <tr>
                            <th>Imagen</th>
                            <th>Código</th>
                            <th>Nombre</th>
                            <th>Categoría</th>
                            <th>Precio</th>
                            <th>Costo</th>
                            <th>Stock</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </main>
    </div>
    
    <!-- Modal producto -->
    <div id="productoModal" class="modal" style="display: none;">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle">Nuevo Producto</h2>
            <form id="productoForm">
                <input type="hidden" id="productoId">
                <div class="form-group">
                    <label>Nombre *</label>
                    <input type="text" id="nombre" required>
                </div>
                <div class="form-group">
                    <label>Código de Barras</label>
                    <input type="text" id="codigoBarras">
                </div>
                <div class="form-group">
                    <label>Categoría</label>
                    <input type="text" id="categoria">
                </div>
                <div class="form-group">
                    <label>Precio *</label>
                    <input type="number" id="precio" step="0.01" required>
                </div>
                <div class="form-group">
                    <label>Costo</label>
                    <input type="number" id="costo" step="0.01">
                </div>
                <div class="form-group">
                    <label>Stock</label>
                    <input type="number" id="stock" value="0">
                </div>
                <div class="form-group">
                    <label>Imagen (URL o Base64)</label>
                    <input type="text" id="imagen" placeholder="URL de la imagen">
                    <small>Puede pegar una URL de imagen o código base64</small>
                </div>
                <button type="submit" class="btn-primary">Guardar Producto</button>
            </form>
        </div>
    </div>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/db.js"></script>
    <script src="js/productos.js"></script>
</body>
</html>
